syntax = "proto3";

package auth;

option go_package = "github.com/hoanglong/chat/backend/core-api/pkg/pb/auth";

service AuthService {
  rpc VerifyToken (VerifyTokenRequest) returns (VerifyTokenResponse);
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  string username = 3;
  string email = 4;
}
